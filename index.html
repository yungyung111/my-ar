<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的產品 AR 動畫 (APNG 完美版)</title>
    <!-- 引入 A-Frame 與 MindAR 庫 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: transparent;
        display: flex; justify-content: center; align-items: center;
        z-index: 999; pointer-events: none;
      }
      .scanner-box {
        width: 250px; height: 250px;
        border: 3px dashed #00ffcc;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
      }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <div class="scanner-box"></div>
    </div>

    <!-- AR 舞台 -->
    <a-scene mindar-image="imageTargetSrc:./husktargets.mind;autoStart:true;uiLoading:no;uiError:no;uiScanning:no;" color-space="sRGB" renderer="colorManagement:true,physicallyCorrectLights" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
      
      <a-assets>
        <!-- 確保 src 指向你上傳的去背 APNG 圖片 -->
        <img id="ar-apng" src="./husk-animation.png" crossorigin="anonymous" />
      </a-assets>

      <!-- 相機 -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
          使用 <a-image> 承載 APNG。
          加上 class="apng-render" 方便 JS 鎖定。
        -->
        <a-image 
          id="ar-display-image"
          class="apng-render"
          src="#ar-apng" 
          width="1" 
          height="1" 
          position="0 0 0.1" 
          rotation="0 0 0" 
          material="shader: flat; transparent: true; alphaTest: 0.05; depthWrite: false;">
        </a-image>
      </a-entity>
    </a-scene>

    <script>
      const targetEl = document.querySelector('#ar-target');
      const overlay = document.querySelector('#scanning-overlay');
      const displayImg = document.querySelector('#ar-display-image');
      
      let animationFrameId = null;

      // 【核心重繪驅動器】：利用 RequestAnimationFrame 強制 WebGL 重新上傳 APNG 紋理
      function forceTextureUpdate() {
        if (displayImg && displayImg.getObject3D('mesh')) {
          const material = displayImg.getObject3D('mesh').material;
          if (material && material.map) {
            // 強制 Three.js（A-Frame 底層）將圖片最新的動態影格重新上傳到 GPU
            material.map.needsUpdate = true;
          }
        }
        // 持續循環重繪
        animationFrameId = requestAnimationFrame(forceTextureUpdate);
      }

      // 監聽：當鏡頭辨識成功
      targetEl.addEventListener("targetFound", event => {
        console.log("產品偵測成功！");
        overlay.style.display = "none";
        // 啟動重繪循環，APNG 就會開始動
        forceTextureUpdate();
      });

      // 監聽：當鏡頭離開產品
      targetEl.addEventListener("targetLost", event => {
        console.log("產品離開視線");
        overlay.style.display = "flex";
        // 停止循環，節省手機效能
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
        }
      });
    </script>
  </body>
</html>
