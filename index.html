<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的產品 AR 動畫</title>
    <!-- 引入 A-Frame 與 MindAR 庫 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: transparent;
        display: flex; justify-content: center; align-items: center;
        z-index: 999; pointer-events: none;
      }
      .scanner-box {
        width: 250px; height: 250px;
        border: 3px dashed #00ffcc;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
      }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <div class="scanner-box"></div>
    </div>

    <!-- AR 舞台 -->
    <a-scene mindar-image="imageTargetSrc: ./husktargets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- 載入去背動畫影片 -->
        <video id="ar-video" src="./husk-animation.webm" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
          這裡放置你的 2D 動畫平面。
          width/height 代表寬高比例。
        -->
        <a-video src="#ar-video" width="1" height="1" position="0 0 0.5" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const targetEl = document.querySelector('#ar-target');
      const video = document.querySelector('#ar-video');
      const overlay = document.querySelector('#scanning-overlay');

      targetEl.addEventListener("targetFound", event => {
        console.log("產品偵測成功！");
        overlay.style.display = "none"; 
        // 強制讓影片區塊顯示出來
        video.style.display = "block"; 
        video.play();
      });

      targetEl.addEventListener("targetLost", event => {
        console.log("產品離開視線");
        overlay.style.display = "flex";
        // 隱藏影片
        video.style.display = "none";
        video.pause();
      });

      document.body.addEventListener("click", () => {
        video.muted = false;
        video.play();
      });
    </script>
  </body>
</html>
