<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的產品 AR 動畫 (終極版)</title>
    <!-- 引入 A-Frame 與 MindAR 庫 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <!-- 【關鍵引入】：Sprite 動畫播放外掛 -->
    <script src="https://cdn.jsdelivr.net/gh/T-T/aframe-sprite-animation-component@master/dist/aframe-sprite-animation-component.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: transparent;
        display: flex; justify-content: center; align-items: center;
        z-index: 999; pointer-events: none;
      }
      .scanner-box {
        width: 250px; height: 250px;
        border: 3px dashed #00ffcc;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
      }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <div class="scanner-box"></div>
    </div>

    <!-- AR 舞台 -->
    <a-scene mindar-image="imageTargetSrc:./husktargets.mind;autoStart:true;uiLoading:no;uiError:no;uiScanning:no;" color-space="sRGB" renderer="colorManagement:true,physicallyCorrectLights" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
      
      <a-assets>
        <!-- 載入去背的 Sprite Sheet 大圖 -->
        <img id="ar-spritesheet" src="./husk-spritesheet.png" crossorigin="anonymous" />
      </a-assets>

      <!-- 相機 -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
          【核心修改】：
          我們使用 <a-entity> 配合 plane 幾何體。
          在 material 裡開啟 transparent 確保去背。
          並加上 sprite-animation 元件：
          cols: 大圖的列數 (例如 5)
          rows: 大圖的行數 (例如 6)
          loop: 是否循環播放 (true)
          frameDuration: 每一格停留的毫秒數 (例如 41 毫秒 = 大約 24fps)
        -->
        <a-entity 
          id="ar-display-entity"
          geometry="primitive: plane; width: 1; height: 1;" 
          position="0 0 0.1" 
          rotation="0 0 0"
          material="shader: flat; src: #ar-spritesheet; transparent: true; alphaTest: 0.05; depthWrite: false;"
          sprite-animation="cols: 5; rows: 1; loop: true; frameDuration: 41;">
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const targetEl = document.querySelector('#ar-target');
      const overlay = document.querySelector('#scanning-overlay');

      // 監聽：當鏡頭辨識成功
      targetEl.addEventListener("targetFound", event => {
        console.log("產品偵測成功！");
        overlay.style.display = "none";
      });

      // 監聽：當鏡頭離開產品
      targetEl.addEventListener("targetLost", event => {
        console.log("產品離開視線");
        overlay.style.display = "flex";
      });
    </script>
  </body>
</html>
