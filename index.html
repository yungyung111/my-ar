<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>我的產品 AR 測試</title>
    <!-- 引入 A-Frame 與 MindAR 庫 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: transparent;
        display: flex; justify-content: center; align-items: center;
        z-index: 999; pointer-events: none;
      }
      .scanner-box {
        width: 250px; height: 250px;
        border: 3px dashed #00ffcc;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
      }
    </style>
  </head>
  <body>

    <div id="scanning-overlay">
      <div class="scanner-box"></div>
    </div>

    <!-- AR 舞台 (修正了所有空格) -->
    <a-scene mindar-image="imageTargetSrc:./husktargets.mind;autoStart:true;uiLoading:no;uiError:no;uiScanning:no;" color-space="sRGB" renderer="colorManagement:true,physicallyCorrectLights" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
      
      <a-assets>
        <!-- 測試用：改為載入一張標準的測試圖片 -->
        <img id="test-img" src="https://aframe.io/examples/showcase/ar/models/fox.png" crossorigin="anonymous" />
      </a-assets>

      <!-- 修正拼字：確保是 a-camera -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 辨識成功後，這裡改為顯示測試圖片，位置 Z 軸設為 0.1 確保看得見 -->
        <a-image src="#test-img" width="1" height="1" position="0 0 0.1" rotation="0 0 0"></a-image>
      </a-entity>
    </a-scene>

    <script>
      const targetEl = document.querySelector('#ar-target');
      const overlay = document.querySelector('#scanning-overlay');

      targetEl.addEventListener("targetFound", event => {
        console.log("產品偵測成功！");
        overlay.style.display = "none";
      });

      targetEl.addEventListener("targetLost", event => {
        console.log("產品離開視線");
        overlay.style.display = "flex";
      });
    </script>
  </body>
</html>
